version: '3.8'

services:
  proxy-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxy-server
    ports:
      - "3000:3000"
      - "8000:8000"
      - "10808:10808"
      - "10809:10809"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PORT=8000
      - FRONTEND_PORT=3000
      - XRAY_PORT=10808
    restart: unless_stopped
    networks:
      - proxy-network

  # 可选：使用已有的xray容器
  # xray:
  #   image: teddysun/xray:latest
  #   container_name: xray
  #   ports:
  #     - "10808:10808"
  #     - "10809:10809"
  #   volumes:
  #     - ./xray/config.json:/etc/xray/config.json:ro
  #   restart: unless_stopped
  #   networks:
  #     - proxy-network

networks:
  proxy-network:
    driver: bridge
